<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GeoCall - Mobile Video Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-white overflow-hidden h-screen w-screen flex flex-col justify-between relative">

  <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-pink-600/20 rounded-full blur-[120px] pointer-events-none"></div>

  <header class="z-20 p-4 flex justify-between items-center glassmorphism m-4 rounded-2xl border border-white/10 shadow-lg animate-fade-in">
    <div class="flex items-center gap-2">
      <div class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></div>
      <h1 class="text-lg font-bold bg-gradient-to-r from-indigo-400 to-pink-500 bg-clip-text text-transparent">GeoCall</h1>
    </div>
    <button id="fullscreenBtn" class="w-10 h-10 rounded-xl bg-white/5 hover:bg-white/10 active:scale-95 transition-all flex items-center justify-center border border-white/10">
      <i class="fa-solid fa-expand text-sm"></i>
    </button>
  </header>

  <main class="relative flex-1 px-4 pb-24 flex items-center justify-center w-full h-full">
    
    <div id="remoteVideoContainer" class="w-full h-full rounded-3xl overflow-hidden relative border border-white/5 shadow-2xl bg-black/40 flex items-center justify-center">
      <video id="remoteVideo" class="w-full h-full object-cover" autoplay playsinline></video>
      <div id="waitingPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-slate-950/80 transition-all duration-500">
        <div class="loading-ring">
          <div></div><div></div><div></div><div></div>
        </div>
        <p class="text-sm text-slate-400 font-medium tracking-wide animate-pulse">Bağlantı bekleniyor...</p>
      </div>
    </div>

    <div id="localVideoContainer" class="absolute top-8 right-8 w-32 h-44 md:w-44 md:h-60 rounded-2xl overflow-hidden border-2 border-indigo-500/50 shadow-2xl z-10 transition-all duration-500 hover:scale-105 active:scale-95">
      <video id="localVideo" class="w-full h-full object-cover scale-x-[-1]" autoplay playsinline muted></video>
    </div>

  </main>

  <footer class="absolute bottom-6 left-1/2 -translate-x-1/2 z-20 flex items-center gap-4 px-6 py-4 glassmorphism rounded-full border border-white/10 shadow-2xl animate-slide-up">
    <button id="toggleMicBtn" class="w-12 h-12 rounded-full bg-white/5 hover:bg-indigo-600 active:scale-90 transition-all flex items-center justify-center border border-white/10">
      <i class="fa-solid fa-microphone text-base"></i>
    </button>
    <button id="toggleCamBtn" class="w-12 h-12 rounded-full bg-white/5 hover:bg-indigo-600 active:scale-90 transition-all flex items-center justify-center border border-white/10">
      <i class="fa-solid fa-video text-base"></i>
    </button>
    <button id="hangupBtn" class="w-14 h-14 rounded-full bg-rose-600 hover:bg-rose-700 active:scale-90 transition-all flex items-center justify-center shadow-lg shadow-rose-600/30">
      <i class="fa-solid fa-phone-slash text-lg"></i>
    </button>
  </footer>

  <div id="modal" class="fixed inset-0 bg-slate-950/90 z-50 flex items-center justify-center p-6 hidden opacity-0 transition-opacity duration-300">
    <div class="glassmorphism max-w-sm w-full p-6 rounded-3xl border border-white/10 text-center scale-90 transition-transform duration-300">
      <div class="w-16 h-16 bg-rose-500/10 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-rose-500/20">
        <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
      </div>
      <h3 id="modalTitle" class="text-xl font-bold mb-2">Oda Dolu!</h3>
      <p id="modalDesc" class="text-slate-400 text-sm mb-6">Bu odada zaten 2 kişi var. Daha fazla kullanıcı katılamaz.</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
